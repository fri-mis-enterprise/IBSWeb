services:
  web:
    build:
      context: .
      dockerfile: IBSWeb/Dockerfile
    ports:
      - '5000:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=ibs_staging;Username=postgres;Password=mis123
      - LocalStoragePath=/app/App_Data/LocalStorage
    volumes:
      - app_data:/app/App_Data/LocalStorage
    depends_on:
      db:
        condition: service_healthy
  db:
    image: 'postgres:18-alpine'
    environment:
      POSTGRES_DB: ibs_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mis123
    volumes:
      - 'postgres_data:/var/lib/postgresql'
    ports:
      - '5432:5432'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U postgres'
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: null
  app_data: null